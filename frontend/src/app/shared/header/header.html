<header class="site-header">
  <a routerLink="/" class="logo">Jobiz</a>

  <nav class="nav">
    <a routerLink="/">Accueil</a>
    <a routerLink="/jobs">Offres</a>
    <a routerLink="/about">À propos</a>
    <a routerLink="/contact">Contact</a>

    <ng-container *ngIf="!currentUser">
      <a routerLink="/login">Connexion</a>
      <a routerLink="/register" class="register-link">Inscription</a>
    </ng-container>

    <ng-container *ngIf="currentUser">
      <a routerLink="/account">Mon compte</a>
      <button type="button" class="logout-button" (click)="logout()">Déconnexion</button>
    </ng-container>
  </nav>
</header>
