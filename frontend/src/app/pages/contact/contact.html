<section class="page">
  <h1>Contact</h1>

  <form class="card contact-form">
    <label>
      Prénom
      <input type="text">
    </label>

    <label>
      Nom
      <input type="text">
    </label>

    <label>
      Email
      <input type="email">
    </label>

    <label>
      Sujet
      <input type="text">
    </label>

    <label>
      Message
      <textarea rows="5"></textarea>
    </label>

    <label class="checkbox">
      <input type="checkbox">
      J’accepte que mes données soient utilisées pour traiter ma demande.
    </label>

    <button type="button" class="btn">Envoyer</button>
  </form>
</section>
