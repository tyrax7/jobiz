<section class="page">
  <div class="card">
    <h1>Mon compte</h1>

    <p *ngIf="isLoading">Chargement du compte...</p>
    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

    <div *ngIf="user">
      <p><strong>Prénom :</strong> {{ user.firstName }}</p>
      <p><strong>Nom :</strong> {{ user.lastName }}</p>
      <p><strong>Email :</strong> {{ user.email }}</p>
     <p><strong>CV actuel :</strong> {{ getCvFileName() || 'Aucun CV envoyé' }}</p>

      <p>
        <a routerLink="/account/profile" class="btn">Modifier mon profil</a>
      </p>

      <p>
        <a routerLink="/account/applications">Voir mes candidatures</a>
      </p> 
      <p *ngIf="isAdmin()">
        <a href="http://localhost:3000/admin" target="_blank" class="btn">
            Accéder au panel admin
        </a>
    </p>
    </div>
  </div>
</section>
